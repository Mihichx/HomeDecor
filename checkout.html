<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Оформление заказа</title>
    <link rel="stylesheet" href="css/main.css">
</head>
<body>
    <div class="container-checkout">
        <h1>Оформление заказа</h1>

        <form class="left-side" method="POST" action="">
            <div class="delivery">
                <label>Доставка в</label>
                <input type="text" name="city" placeholder="Укажите ваш город">
                <select name="country">
                    <option>Россия</option>
                    <option>Беларусь</option>
                    <option>Казахстан</option>
                </select>
            </div>

            <div class="buyer">
                <h2>Покупатель</h2>
                <button type="button" class="btn-login">Войти</button>
            </div>

            <div class="row-3">
                <input type="text" name="fullname" placeholder="Фамилия и имя" required>
                <input type="tel" name="phone" placeholder="Телефон" required>
                <input type="email" name="email" placeholder="E-mail" required>
            </div>

            <div class="row-2">
                <input type="text" name="address" placeholder="Адрес" required>
                <input type="text" name="postal_code" placeholder="Почтовый индекс">
            </div>

            <textarea name="notes" placeholder="Примечания покупателя"></textarea>

            <div class="payment">
                <h2>Способы оплаты</h2>
                <div class="payment-methods">
                    <button type="button" class="payment-card" data-payment="cash">Оплата наличными при получении</button>
                    <button type="button" class="payment-card" data-payment="card">Оплата банковской картой при получении</button>
                    <button type="button" class="payment-card" data-payment="sberbank">На карту Сбербанка № 2202 3245 7896 5467</button>
                    <button type="button" class="payment-card" data-payment="cod">Наложенный платёж (стоимость увеличивается на 5%)</button>
                </div>
                <input type="hidden" name="payment_method" id="selectedPayment" required>
            </div>

            <div class="checkboxes">
                <div class="checkbox-row">
                    <input type="checkbox" id="terms" required>
                    <label for="terms">Отметьте флажок, чтобы принять <a href="#">Условия использования</a></label>
                </div>
                <div class="checkbox-row">
                    <input type="checkbox" id="personal" required>
                    <label for="personal">Я согласен/согласна на обработку своих <a href="#">персональных данных</a> указанным образом</label>
                </div>
            </div>
            
            <button type="submit" class="btn-order">Оформить заказ (810 руб.)</button>
        </form>

        <div class="right-side">
            <div class="order-card">
                <div class="order-card-title">Ваш заказ:</div>
                <div class="order-product">
                    <div class="product-img">
                        <img src="img/vase2.jpg" alt="">
                    </div>
                    <div class="product-info">
                        Ваза из прозрачного стекла 15 см
                        <div class="product-price">1 x 810 руб.</div>
                    </div>
                </div>
            </div>

            <div class="order-total-row">
                <p>1 шт.</p>
                <p>810 руб.</p>
            </div>

            <div class="coupon-section">
                <div class="coupon-label">Купон/сертификат</div>
                <input type="text" class="coupon-input" name="coupon">
            </div>

            <div class="order-final">
                <p>Сумма заказа</p>
                <p class="price">810 руб.</p>
            </div>
        </div>
    </div>
</body>
</html>
