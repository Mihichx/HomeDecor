<div class="cart-container">
    <h1 class="cart-title">Моя корзина</h1>

    <div class="cart-top">
        <div class="coupon">
            <label for="coupon-input">Введите код купона для скидки:</label>
            <form id="promoForm" class="coupon-input-wrap">
                <input type="text" name="promo_code">
                <button type="submit" name="apply_promo" class="coupon-btn">›</button>
            </form>
        </div>
        <div class="total">
            <p class="total-label">Итого:</p>
            <p id="sum" class="total-sum">{{ final_price }} руб.</p>
        </div>
        <a href="/order" class="arrange">Оформить заказ</a>
    </div>

    <div class="cart-bottom">

        <div class="cart-bottom-header">
            <p class="items-count">В корзине {{ value }}</p>
        </div>

        <!-- товар -->
        {{ product }}
    </div>
</div>

<div class="cart-item">
    <div class="item-image">
        <img src="{{ img }}" loading="lazy" alt="Ваза">
    </div>

    <div class="item-info">
        <h3 class="item-name">{{ name }}</h3>
        <p class="item-number">Номер товара:<br>{{ id }}</p>
    </div>

    <div class="item-price">
        <span class="price-one" data-price="{{ price_clean }}">{{ price }}</span> руб.
        <p class="price-label">цена за 1 шт.</p>
    </div>

    <div class="item-quantity">
        <button class="btn-quantity minus">−</button>
        <input type="text" value="{{ quantity }}" class="quantity-input" readonly>
        <button class="btn-quantity plus">+</button>
    </div>

    <div class="item-total">{{ end_price }} руб.</div>
</div>
