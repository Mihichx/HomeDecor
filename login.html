<section class="auth-page center">
    <div class="auth-card">
        <h1>Вход в личный кабинет</h1>
        <form class="auth-form" method='POST'>
            {{ $error }}
            <div class="auth-field">
                <label>Логин</label>
                <input type="login" name='login' placeholder="Введите логин" required>
            </div>

            <div class="auth-field">
                <label>Пароль</label>
                <input type="password" name='password' placeholder="Введите пароль" required>
            </div>

            <button type="submit" class="auth-button" name='action'>Войти</button>
        </form>
        <form method="POST">
            <input type="hidden" name="registration">
            <button class="auth-link hover" type="submit">Регистрация</button>
        </form>
    </div>
</section>
