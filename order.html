<div class="container-checkout">
    <h1>Оформление заказа</h1>

    <form class="left-side" method="POST">
        <div class="delivery">
            <label>Доставка в</label>
            <input type="text" name="city" placeholder="Укажите ваш город" required>
        </div>

        <div class="row-3">
            <input type="text" name="fullname" placeholder="Фамилия и имя" value="{{ name }}" readonly>
            <input type="tel" name="phone" placeholder="Телефон" required>
            <input type="email" name="email" placeholder="E-mail" value="{{ email }}" readonly>
        </div>

        <div class="row-2">
            <input type="text" name="address" placeholder="Адрес" required>
            <input type="text" name="postal_code" placeholder="Почтовый индекс" required>
        </div>

        <textarea name="notes" placeholder="Примечания покупателя"></textarea>

        <div class="payment">
            <h2>Способы оплаты</h2>
            <div class="payment-methods">
                <button type="button" class="payment-card" data-payment="cash">Оплата наличными при получении</button>
                <button type="button" class="payment-card" data-payment="card">Оплата банковской картой при получении</button>
                <button type="button" class="payment-card" data-payment="sberbank">На карту Сбербанка № 2202 3245 7896 5467</button>
                <button type="button" class="payment-card" data-payment="cod">Наложенный платёж (стоимость увеличивается на 5%)</button>
            </div>
            <!-- Скрытое поле для передачи выбранного метода на сервер -->
            <input type="hidden" name="payment_method" id="selectedPayment" required>
        </div>

        <div class="checkboxes">
            <div class="checkbox-row">
                <input type="checkbox" id="terms" required>
                <label for="terms">Отметьте флажок, чтобы принять <a href="#">Условия использования</a></label>
            </div>
            <div class="checkbox-row">
                <input type="checkbox" id="personal" required>
                <label for="personal">Я согласен/согласна на обработку своих <a href="#">персональных данных</a> указанным образом</label>
            </div>
        </div>
        
        <div class="column">
            <button type="submit" class="btn-order">Оформить заказ ({{ final_price }} руб.)</button>
            <button onclick="history.back();" class="btn-order">Назад</button>
        </div>
    </form>
</div>
