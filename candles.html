<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="css/main.css">
</head>
<body>
    <main>
        <div class="container-candles">

            <div class="candles-header">
                <div class="navigation">
                    <a href="catalog.html" class="cat">КАТАЛОГ > </a><a class="active" href="candles.html">СВЕЧИ ВОСКОВЫЕ</a>
                </div>
                <div class="sort">
                    <p>Сортировать по:</p>
                    <select>
                        <option>Размеру</option>
                        <option>Цене по возрастанию</option>
                        <option>Цене по убыванию</option>
                        <option>Популярности</option>
                    </select>
                </div>
            </div>

            <div class="candles-grid">

                <div class="candle-card">
                        <img src="img/candle1.jpg" alt="Свеча">
                    <div class="candles-info">
                        <p class="candle-name">Свеча ароматическая «Лавандовый вечер»</p>
                        <p class="candle-prise">790 руб.</p>
                        <button class="candle-btn">Добавить</button>
                    </div>
                </div>

                <div class="candle-card">
                        <img src="img/candle2.jpg" alt="Свеча">
                    <div class="candles-info">
                        <p class="candle-name">Свеча в стекле «Сакура с клубникой</p>
                        <p class="candle-prise">1 230 руб.</p>
                        <button class="candle-btn">Добавить</button>
                    </div>
                </div>

                <div class="candle-card">
                        <img src="img/candle3.jpg" alt="Свеча">
                    <div class="candles-info">
                        <p class="candle-name">Свеча «Снежная сказка»</p>
                        <p class="candle-prise">1 000 руб.</p>
                        <button class="candle-btn">Добавить</button>
                    </div>
                </div>

            </div>
        </div>
    </main>
</body>
</html>
