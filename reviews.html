<div class="container-reviews">
    <section class="top-text">
        <p>Делитесь впечатлениями и читайте, что думают другие о магазине «Дом Деталей»!</p>
    </section>

    <!-- Отзывы -->
    <section class="review">
        {{ reviews }}
    </section>

    <section class="form-section center column">
        <h2>Оставить свой отзыв</h2>
        <form class="review-form center column">
            <input type="text" name="rev_name" placeholder="Имя" value="{{ login }}" readonly>
            <select name="rev_rating">
                <option value="5">★★★★★</option>
                <option value="4">★★★★</option>
                <option value="3">★★★</option>
                <option value="2">★★</option>
                <option value="1">★</option>
            </select>
            <textarea name="rev_text" placeholder="Ваш отзыв"></textarea>
            <button type="submit" name="send_review">Отправить</button>
        </form>
    </section>
</div>

<div class="reviews-card">
    <div class="review-content">
        <div class="review-top">
            <span class="stars">{{ stars }}</span>
            <span class="date">{{ date }}</span>
        </div>
        <h3>{{ name }}</h3>
        <p>«{{ description }}»</p>
    </div>
</div>
