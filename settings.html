<section class="profile-edit">
    <div class="profile-edit-container">
        <form class="profile-edit-form" method="POST">    
            <div class="profile-edit-row">
                <div class="profile-edit-field">
                    <label>Имя</label>
                    <input type="text" name="login" value="{{ login }}" required>
                </div>

                <div class="profile-edit-field">
                    <label>Старый пароль</label>
                    <input type="password" name="old_password" placeholder="Введите текущий пароль" required>
                </div>
            </div>

            <div class="profile-edit-row">
                <div class="profile-edit-field">
                    <label>Email</label>
                    <input type="email" name="email" value="{{ email }}" required>
                </div>

                <div class="profile-edit-field">
                    <label>Новый пароль (необязательно)</label>
                    <input type="password" name="new_password" placeholder="Введите новый пароль">
                </div>
            </div>

            <div class="profile-edit-buttons center">
                <button type="submit" name="update_profile" class="save-button">Сохранить изменения</button>
                <a href="/profile" class="cancel-button center">Отмена</a>
            </div>
        </form>
    </div>
</section>
