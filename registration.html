<section class="auth-page center">
    <div class="auth-card">
        <h1>Регистрация</h1>
        <form class="auth-form" method="POST">           
            <div class="auth-field">
                <label>Имя</label>
                <input type="text" name="login1" placeholder="Логин" required>
            </div>

            <div class="auth-field">
                <label>E-mail</label>
                <input type="e-mail" name="e-mail1" placeholder="E-mail" required>
            </div>

            <div class="auth-field">
                <label>Пароль</label>
                <input type="password" name="password1" placeholder="Пароль" required>
            </div>
            <div class="auth-field">
                <input type="password" name="password_repeat" placeholder="Повторите пароль" required>
            </div>

            <button type="submit" class="auth-button" name="register_btn">Зарегистрироваться</button>
            
            <a href="/profile" class="auth-link">Уже есть аккаунт?</a>
        </form>
    </div>
</section>
