<section class="auth-page center">
    <div class="auth-card">
        <h1>Регистрация</h1>

        <form class="auth-form" method="POST">
            {{ $error }}
            <input type="hidden" name="registration">
            <div class="auth-field">
                <label>Имя</label>
                <input type="login" name="login1" placeholder="Логин" required>
            </div>

            <div class="auth-field">
                <label>Пароль</label>
                <input type="password" name="password1" placeholder="Пароль" required>
            </div>

            <div class="auth-field">
                <input type="password" name="password_repeat" placeholder="Повторите пароль" required>
            </div>

            <button type="submit" class="auth-button" name='action'>Зарегистрироваться</button>
            <a href="/profile" class="auth-link">Уже есть аккаунт?</a>
        </form>
    </div>
</section>
